spring:
  application:
    name: order-flow

  datasource:
    url: jdbc:postgresql://localhost:5432/order_flow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  jackson:
    serialization:
      indent-output: true
